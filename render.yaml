services:
  - type: web
    name: url-shortener
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: url-shortener-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
    # Явно указываем зависимости
    dependencies:
      - url-shortener-db
      - url-shortener-redis

  - type: redis
    name: url-shortener-redis
    ipAllowList: []
    plan: free

  - type: worker
    name: url-shortener-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: url-shortener-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: url-shortener
          property: envVarKey: SECRET_KEY
    dependencies:
      - url-shortener-db
      - url-shortener-redis
      - url-shortener

databases:
  - name: url-shortener-db
    databaseName: urlshortener
    plan: free